<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTranslate</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- 标题栏 + 状态 -->
    <header class="header">
      <span class="logo">🌐 SmartTranslate</span>
      <div class="header-right">
        <span id="historyBadge" class="badge" title="翻译历史条数">0</span>
        <a href="#" class="settings-link" id="openOptions" title="设置">⚙</a>
      </div>
    </header>

    <!-- 页面操作 -->
    <section class="section actions">
      <button id="translatePageBtn" class="btn btn-primary">📄 翻译此页</button>
      <button id="restorePageBtn" class="btn btn-secondary">↩ 还原原文</button>
    </section>

    <!-- 引擎 & 风格 -->
    <section class="section">
      <div class="row">
        <label class="label">引擎</label>
        <select id="engineSelect" class="select"></select>
      </div>
      <div class="row">
        <label class="label">风格</label>
        <select id="styleSelect" class="select">
          <option value="explain">释义 (推荐)</option>
          <option value="literal">直译</option>
        </select>
      </div>
      <div class="row">
        <label class="label">目标语言</label>
        <select id="langSelect" class="select">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </div>
    </section>

    <!-- 划词翻译提示 -->
    <section class="section quick-tip">
      <div class="tip-icon">💡</div>
      <div class="tip-text">
        <strong>划词翻译：</strong>选中页面文本 → 点击蓝色图标<br>
        <strong>生词闪卡：</strong>选中文本 → <kbd>Alt</kbd>+<kbd>A</kbd>
      </div>
    </section>

    <!-- 翻译历史 -->
    <section class="section">
      <div class="section-header">
        <span class="label">📋 翻译历史 <span id="historyCount" class="count"></span></span>
        <div class="header-actions">
          <button id="clearHistoryBtn" class="btn-link" title="清空全部">🗑 清空</button>
          <a href="#" id="viewAllHistory" class="link">查看全部 →</a>
        </div>
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-state">暂无翻译记录<br><small>选中文本翻译后会自动保存</small></div>
      </div>
    </section>

    <!-- 底部状态 -->
    <footer class="footer">
      <span id="cacheStats" class="status">缓存: --</span>
      <button id="refreshBtn" class="btn-link" title="刷新状态">🔄</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
