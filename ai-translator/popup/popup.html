<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>SmartTranslate</title><link rel="stylesheet" href="popup.css"></head>
<body>
<div class="popup">
  <header class="header">
    <span class="logo">🌐 SmartTranslate</span>
    <a href="#" id="openOptions" class="settings-link">⚙</a>
  </header>

  <section class="section actions">
    <button id="translatePageBtn" class="btn btn-primary">📄 翻译此页</button>
    <button id="restorePageBtn" class="btn btn-secondary">↩ 还原原文</button>
  </section>

  <section class="section">
    <div class="row"><label class="label">引擎</label><select id="engineSelect" class="select"></select></div>
    <div class="row"><label class="label">风格</label><select id="styleSelect" class="select"><option value="explain">释义</option><option value="literal">直译</option></select></div>
    <div class="row"><label class="label">目标</label><select id="langSelect" class="select"><option value="zh-CN">简体中文</option><option value="zh-TW">繁体中文</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option></select></div>
    <div class="row"><label class="label">划词</label><select id="modeSelect" class="select"><option value="card">💬 弹窗卡片</option><option value="inline">📝 内联高亮</option></select></div>
  </section>

  <section class="section">
    <div class="section-header"><span>📋 翻译历史</span><span id="historyCount" class="count"></span></div>
    <div id="historyList" class="history-list"><div class="empty-state">暂无记录</div></div>
  </section>

  <footer class="footer"><span id="status">就绪</span></footer>
</div>
<script src="popup.js"></script>
</body>
</html>
