<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Force 360/QQ/UC browsers to use Chrome/Webkit kernel -->
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<title>GitHub 名片查询器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px 40px;
  }

  .container {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── Header ── */
  .header { text-align: center; }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #c9d1d9;
  }

  .header p {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
  }

  /* ── Search ── */
  .search-bar {
    display: flex;
    width: 100%;
    gap: 8px;
  }

  .search-bar input {
    flex: 1;
    padding: 10px 14px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-bar input::placeholder {
    color: #8b949e;
    opacity: 0.7;
  }

  .search-bar input:focus {
    border-color: #58a6ff;
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }

  .search-bar button {
    padding: 10px 20px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .search-bar button:hover:not(:disabled) {
    background: #2ea043;
  }

  .search-bar button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Status message ── */
  .status {
    width: 100%;
    text-align: center;
    padding: 16px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }

  .status.show { display: block; }

  .status.loading {
    background: rgba(88, 166, 255, 0.08);
    border: 1px solid rgba(88, 166, 255, 0.2);
    color: #58a6ff;
  }

  .status.error {
    background: rgba(248, 81, 73, 0.08);
    border: 1px solid rgba(248, 81, 73, 0.2);
    color: #f85149;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(88, 166, 255, 0.3);
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Card ── */
  .card {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 32px 28px;
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
    animation: fadeUp 0.35s ease;
  }

  .card.show { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #58a6ff;
    object-fit: cover;
    background: #30363d;
  }

  .card .name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }

  .card .login {
    font-size: 15px;
    color: #58a6ff;
    text-decoration: none;
  }

  .card .login:hover { text-decoration: underline; }

  .card .bio {
    font-size: 14px;
    color: #8b949e;
    line-height: 1.5;
    max-width: 340px;
  }

  .card .bio:empty { display: none; }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 32px;
    margin-top: 8px;
    padding-top: 16px;
    border-top: 1px solid #30363d;
    width: 100%;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat .num {
    font-size: 20px;
    font-weight: 700;
    color: #c9d1d9;
  }

  .stat .label {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Footer ── */
  .note {
    font-size: 11px;
    color: #8b949e;
    text-align: center;
  }

  .note a { color: #58a6ff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐙 GitHub 名片查询器</h1>
    <p>输入 GitHub 用户名，查看用户名片</p>
  </div>

  <div class="search-bar">
    <input
      id="username"
      type="text"
      placeholder="输入 GitHub 用户名，如 octocat"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="btn-query">🔍 查询</button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="card">
    <img class="avatar" id="avatar" src="" alt="avatar">
    <h2 class="name" id="name"></h2>
    <a class="login" id="login" href="#" target="_blank" rel="noopener"></a>
    <p class="bio" id="bio"></p>
    <div class="stats">
      <div class="stat">
        <span class="num" id="repos">0</span>
        <span class="label">Public Repos</span>
      </div>
      <div class="stat">
        <span class="num" id="followers">0</span>
        <span class="label">Followers</span>
      </div>
      <div class="stat">
        <span class="num" id="following">0</span>
        <span class="label">Following</span>
      </div>
    </div>
  </div>

  <p class="note">数据来自 <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a>，无需 Token</p>
</div>

<script>
(function () {
  var input = document.getElementById('username');
  var btn = document.getElementById('btn-query');
  var statusEl = document.getElementById('status');
  var card = document.getElementById('card');
  var avatar = document.getElementById('avatar');
  var nameEl = document.getElementById('name');
  var loginEl = document.getElementById('login');
  var bioEl = document.getElementById('bio');
  var reposEl = document.getElementById('repos');
  var followersEl = document.getElementById('followers');
  var followingEl = document.getElementById('following');

  function showStatus(type, message) {
    statusEl.className = 'status show ' + type;
    statusEl.innerHTML = message;
  }

  function hideStatus() {
    statusEl.className = 'status';
    statusEl.innerHTML = '';
  }

  function setLoading(loading) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>查询中…'
      : '🔍 查询';
    card.classList.remove('show');
    hideStatus();
  }

  function renderCard(user) {
    avatar.src = user.avatar_url || '';
    avatar.alt = (user.login || '') + "'s avatar";
    nameEl.textContent = user.name || user.login || '';
    loginEl.textContent = '@' + (user.login || '');
    loginEl.href = user.html_url || '#';
    bioEl.textContent = user.bio || '';
    reposEl.textContent = (user.public_repos != null ? user.public_repos : 0).toLocaleString();
    followersEl.textContent = (user.followers != null ? user.followers : 0).toLocaleString();
    followingEl.textContent = (user.following != null ? user.following : 0).toLocaleString();
    card.classList.add('show');
  }

  // ── HTTP request (XHR fallback for old browsers) ──
  function httpGet(url, callback) {
    // Try modern fetch first
    if (typeof fetch === 'function') {
      fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } })
        .then(function (res) {
          callback(null, res);
        })
        .catch(function (err) {
          callback(err, null);
        });
      return;
    }

    // Fallback to XMLHttpRequest for IE/old 360
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.setRequestHeader('Accept', 'application/vnd.github+json');
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        // Build a fetch-like response object
        var fakeRes = {
          ok: xhr.status >= 200 && xhr.status < 300,
          status: xhr.status,
          headers: {
            get: function (name) {
              if (name.toLowerCase() === 'x-ratelimit-remaining') {
                return xhr.getResponseHeader('X-RateLimit-Remaining');
              }
              return null;
            }
          },
          json: function () {
            try {
              return Promise.resolve(JSON.parse(xhr.responseText));
            } catch (e) {
              return Promise.reject(e);
            }
          }
        };
        callback(null, fakeRes);
      }
    };
    xhr.onerror = function () {
      callback(new Error('Network error'), null);
    };
    xhr.send();
  }

  // ── Query ──
  function query() {
    var username = input.value.trim();
    if (!username) {
      input.focus();
      return;
    }

    setLoading(true);

    httpGet('https://api.github.com/users/' + encodeURIComponent(username), function (err, res) {
      if (err) {
        showStatus('error', '❌ 网络异常，稍后再试');
        btn.disabled = false;
        btn.innerHTML = '🔍 查询';
        return;
      }

      if (res.ok) {
        res.json().then(function (user) {
          renderCard(user);
          btn.disabled = false;
          btn.innerHTML = '🔍 查询';
        }).catch(function () {
          showStatus('error', '❌ 数据解析失败，稍后再试');
          btn.disabled = false;
          btn.innerHTML = '🔍 查询';
        });
      } else if (res.status === 404) {
        showStatus('error', '❌ 用户不存在，请检查拼写');
        btn.disabled = false;
        btn.innerHTML = '🔍 查询';
      } else {
        showStatus('error', '❌ 网络异常，稍后再试');
        btn.disabled = false;
        btn.innerHTML = '🔍 查询';
      }
    });
  }

  // ── Events ──
  btn.addEventListener('click', query);

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.keyCode === 13) query();
  });
})();
</script>
</body>
</html>
