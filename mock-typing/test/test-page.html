<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Test — Simulated Google Translate</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
  .container { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
  textarea {
    width: 100%; min-height: 80px; padding: 12px; border: 1px solid #dadce0;
    border-radius: 8px; font-size: 16px; resize: none; outline: none;
    font-family: inherit; box-sizing: border-box;
  }
  textarea:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
  .output { margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 6px; }
  .status { font-size: 14px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h3>🔤 Simulated Google Translate Input</h3>
  <p>This page mimics a framework-controlled textarea (like Google Translate's).</p>

  <!-- Mimicking Google Translate's textarea: role="combobox", class-based styling -->
  <label for="source">Source text</label>
  <textarea
    id="source"
    class="er8xn"
    role="combobox"
    aria-label="原文"
    placeholder="Enter text..."
  ></textarea>

  <div class="output">
    <strong>Current value:</strong>
    <pre id="output" style="margin:4px 0; background:#fff; padding:8px; border-radius:4px; min-height:20px;"></pre>
  </div>

  <div class="status" id="status">Waiting for input...</div>
</div>

<script>
  // Simulate a framework-controlled input (like React controlled component)
  // This intercepts the 'input' event and updates its own state
  const ta = document.getElementById('source');
  const output = document.getElementById('output');
  const status = document.getElementById('status');

  let eventLog = [];

  ta.addEventListener('focus', () => { eventLog.push('focus'); updateStatus(); });
  ta.addEventListener('keydown', (e) => { eventLog.push('keydown:'+e.key); updateStatus(); });
  ta.addEventListener('keypress', (e) => { eventLog.push('keypress:'+e.key); updateStatus(); });
  ta.addEventListener('beforeinput', (e) => { eventLog.push('beforeinput:'+e.inputType); updateStatus(); });
  ta.addEventListener('input', (e) => {
    eventLog.push('input:'+e.inputType+':'+(e.data||''));
    output.textContent = ta.value || '(empty)';
    updateStatus();
  });
  ta.addEventListener('keyup', (e) => { eventLog.push('keyup:'+e.key); updateStatus(); });
  ta.addEventListener('change', () => { eventLog.push('change'); updateStatus(); });

  function updateStatus() {
    status.textContent = 'Events: ' + eventLog.slice(-8).join(' → ');
  }

  // Clear events on click
  ta.addEventListener('click', () => { eventLog = []; updateStatus(); });
</script>
</body>
</html>
