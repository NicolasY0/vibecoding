<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Typing</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🤖 Mock Typing</h1>
      <span class="subtitle">Human-like text input simulator</span>
    </header>

    <!-- Text input -->
    <section class="section">
      <label class="label" for="target-text">Target Text</label>
      <textarea
        id="target-text"
        class="text-input"
        placeholder="Paste or type the text you want to simulate typing..."
        rows="5"
      ></textarea>
      <div class="input-actions">
        <span class="char-count"><span id="char-count">0</span> chars</span>
        <button id="btn-generate" class="btn-generate" title="Generate random text">
          🎲 Random Text
        </button>
      </div>
      <!-- Generate categories -->
      <div class="gen-categories" id="gen-categories">
        <button class="gen-chip" data-genre="essay">📝 Essay</button>
        <button class="gen-chip" data-genre="chinese">🀄 中文</button>
        <button class="gen-chip" data-genre="code">💻 Code</button>
        <button class="gen-chip" data-genre="lorem">📄 Lorem</button>
        <button class="gen-chip" data-genre="social">💬 Social</button>
        <button class="gen-chip" data-genre="business">💼 Business</button>
      </div>
    </section>

    <!-- Settings -->
    <section class="section">
      <label class="label">Settings</label>

      <div class="setting-row">
        <div class="setting-header">
          <span>Typing Speed</span>
          <span class="setting-value" id="wpm-value">60 WPM</span>
        </div>
        <input type="range" id="wpm" class="slider" min="30" max="130" value="85" step="5">
        <div class="range-labels">
          <span>Slow</span>
          <span>Fast (Trained ~85)</span>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-header">
          <span>Error Rate</span>
          <span class="setting-value" id="error-value">2%</span>
        </div>
        <input type="range" id="error-rate" class="slider" min="0" max="10" value="2" step="1">
        <div class="range-labels">
          <span>Perfect</span>
          <span>Sloppy</span>
        </div>
      </div>
    </section>

    <!-- Controls -->
    <section class="section controls-section">
      <div class="btn-row">
        <button id="btn-start" class="btn btn-start" title="Start typing (Ctrl+Enter)">
          ▶ Start
        </button>
        <button id="btn-pause" class="btn btn-pause" title="Pause / Resume" disabled>
          ⏸ Pause
        </button>
        <button id="btn-stop" class="btn btn-stop" title="Stop" disabled>
          ⏹ Stop
        </button>
      </div>
    </section>

    <!-- Progress -->
    <section class="section progress-section" id="progress-section" style="display:none;">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-info">
        <span id="progress-text">0 / 0</span>
        <span class="status-badge" id="status-badge">IDLE</span>
      </div>
    </section>

    <!-- Presets -->
    <section class="section presets-section">
      <label class="label">Quick Presets</label>
      <div class="preset-chips">
        <button class="chip" data-wpm="50" data-error="0">🐢 Beginner (50wpm)</button>
        <button class="chip active" data-wpm="85" data-error="2">🧑 Trained (85wpm)</button>
        <button class="chip" data-wpm="100" data-error="3">🏃 Fast (100wpm)</button>
        <button class="chip" data-wpm="120" data-error="4">⚡ Expert (120wpm)</button>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
